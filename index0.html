<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitor Landscape Dashboard</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/portfolio.css">
    <link rel="stylesheet" href="css/competitor.css">
    <link rel="stylesheet" href="css/indication.css">
    <link rel="stylesheet" href="css/regional.css">
    <link rel="stylesheet" href="css/nilex.css">
</head>
<body>
    <header class="app-header">
        <div class="header-top">
            <div class="header-brand">
                <img src="LANCOMPlogo.png" alt="LANCOMP" class="app-logo">
                <div class="header-title">
                    <h1>Competitor Landscape Visualization</h1>
                    <h2 class="header-subtitle">for Portfolio/Project Management</h2>
                </div>
            </div>
        </div>
        <div class="header-bottom">
            <nav class="tab-nav">
                <button class="tab-btn active" data-tab="portfolio">Portfolio Landscape</button>
                <button class="tab-btn" data-tab="competitor">Compound Competitor</button>
                <button class="tab-btn" data-tab="indication">Indication-level</button>
                <button class="tab-btn" data-tab="regional">Regional Timeline</button>
                <button class="tab-btn" data-tab="nilex">NILEX Overview</button>
            </nav>
            <div class="header-author">
                <span class="author-name"><span class="author-label">Author: </span>Jiawei Xu</span>
                <span class="author-email">xu_jiawei@lilly.com</span>
            </div>
        </div>
    </header>

    <!-- ============ PAGE 1: Portfolio Landscape ============ -->
    <section id="portfolio" class="tab-content active">
        <div class="page-toolbar">
            <h2>Portfolio Landscape</h2>
            <div class="toolbar-actions">
                <button class="btn btn-primary" onclick="Portfolio.addRegionPlan()">+ Region Plan</button>
                <button class="btn btn-primary" onclick="Portfolio.addScenario()">+ Scenario</button>
                <button class="btn btn-primary" onclick="Portfolio.addCheckpoint()">+ Checkpoint</button>
                <button class="btn btn-secondary" onclick="Portfolio.addHighlightBox()">+ Highlight Box</button>
                <button class="btn btn-secondary" onclick="Portfolio.addComment()">+ Comment</button>
                <button class="btn btn-accent" onclick="Portfolio.exportPNG()">Export PNG</button>
            </div>
        </div>
        <div class="config-panel" id="portfolio-config">
            <div class="config-row">
                <label>Main Title:</label>
                <input type="text" id="pf-title" value="Global MASH Plan" style="width:300px" onchange="Portfolio.render()">
                <label>Start Year:</label>
                <input type="number" id="pf-start-year" value="2025" min="2020" max="2040" onchange="Portfolio.render()">
                <label>End Year:</label>
                <input type="number" id="pf-end-year" value="2033" min="2020" max="2050" onchange="Portfolio.render()">
            </div>
        </div>
        <div class="canvas-container" id="portfolio-canvas-container">
            <canvas id="portfolio-canvas"></canvas>
        </div>
        <div class="edit-panel" id="portfolio-edit-panel"></div>
    </section>

    <!-- ============ PAGE 2: Compound Competitor Landscape ============ -->
    <section id="competitor" class="tab-content">
        <div class="page-toolbar">
            <h2>Compound Competitor Landscape</h2>
            <div class="toolbar-actions">
                <button class="btn btn-primary" onclick="Competitor.addCompoundType()">+ Compound Type</button>
                <button class="btn btn-primary" onclick="Competitor.addCompound()">+ Compound</button>
                <button class="btn btn-primary" onclick="Competitor.addStatusStage()">+ Status Stage</button>
                <button class="btn btn-secondary" onclick="Competitor.addComment()">+ Comment</button>
                <button class="btn btn-accent" onclick="Competitor.exportPNG()">Export PNG</button>
            </div>
        </div>
        <div class="config-panel" id="competitor-config">
            <div class="config-row">
                <label>Main Title:</label>
                <input type="text" id="cc-title" value="Inj. Incretins for CWM Competitor Landscape" style="width:400px" onchange="Competitor.render()">
            </div>
        </div>
        <div class="canvas-container" id="competitor-canvas-container">
            <canvas id="competitor-canvas"></canvas>
        </div>
        <div class="edit-panel" id="competitor-edit-panel"></div>
    </section>

    <!-- ============ PAGE 3: Indication-level Landscape ============ -->
    <section id="indication" class="tab-content">
        <div class="page-toolbar">
            <h2>Indication-level Landscape</h2>
            <div class="toolbar-actions">
                <button class="btn btn-primary" onclick="Indication.addRegion()">+ Region</button>
                <button class="btn btn-primary" onclick="Indication.showRegionPicker(event, 'compound')">+ Compound</button>
                <button class="btn btn-primary" onclick="Indication.showRegionPicker(event, 'emptyRow')">+ New Row</button>
                <button class="btn btn-secondary" onclick="Indication.addComment()">+ Comment</button>
                <button class="btn btn-accent" onclick="Indication.exportPNG()">Export PNG</button>
            </div>
        </div>
        <div class="config-panel" id="indication-config">
            <div class="config-row">
                <label>Main Title:</label>
                <input type="text" id="il-title" value="MASLD Landscape" style="width:300px" onchange="Indication.render()">
                <label>Start Year:</label>
                <input type="number" id="il-start-year" value="2024" min="2020" max="2040" onchange="Indication.render()">
                <label>End Year:</label>
                <input type="number" id="il-end-year" value="2034" min="2020" max="2050" onchange="Indication.render()">
            </div>
        </div>
        <div class="canvas-container" id="indication-canvas-container">
            <canvas id="indication-canvas"></canvas>
        </div>
        <div class="edit-panel" id="indication-edit-panel"></div>
    </section>

    <!-- ============ PAGE 4: Regional Timeline ============ -->
    <section id="regional" class="tab-content">
        <div class="page-toolbar">
            <h2>Regional Timeline</h2>
            <div class="toolbar-actions">
                <button class="btn btn-primary" onclick="Regional.addRegion()">+ Region</button>
                <button class="btn btn-primary" onclick="Regional.addCheckpoint()">+ Checkpoint</button>
                <button class="btn btn-primary" onclick="Regional.addLine()">+ Line / Polyline</button>
                <button class="btn btn-secondary" onclick="Regional.addComment()">+ Comment</button>
                <button class="btn btn-accent" onclick="Regional.exportPNG()">Export PNG</button>
            </div>
        </div>
        <div class="config-panel" id="regional-config">
            <div class="config-row">
                <label>Main Title:</label>
                <input type="text" id="rt-title" value="Timeline to D3 Forum" style="width:300px" onchange="Regional.render()">
                <label>Start Date:</label>
                <input type="date" id="rt-start-date" value="2025-03-02" onchange="Regional.render()">
                <label>End Date:</label>
                <input type="date" id="rt-end-date" value="2025-04-27" onchange="Regional.render()">
                <label>Interval:</label>
                <select id="rt-interval" onchange="Regional.render()">
                    <option value="week" selected>Week</option>
                    <option value="day">Day</option>
                    <option value="month">Month</option>
                </select>
            </div>
        </div>
        <div class="canvas-container" id="regional-canvas-container">
            <canvas id="regional-canvas"></canvas>
        </div>
        <div class="edit-panel" id="regional-edit-panel"></div>
    </section>

    <!-- ============ PAGE 5: NILEX Overview ============ -->
    <section id="nilex" class="tab-content">
        <div class="page-toolbar">
            <h2>NILEX Overview</h2>
            <div class="toolbar-actions">
                <button class="btn btn-primary" onclick="Nilex.addIndication()">+ Indication</button>
                <button class="btn btn-primary" onclick="Nilex.addCompound()">+ Compound</button>
                <button class="btn btn-primary" onclick="Nilex.addStatusType()">+ Status Type</button>
                <button class="btn btn-secondary" onclick="Nilex.addComment()">+ Comment</button>
                <button class="btn btn-accent" onclick="Nilex.exportPNG()">Export PNG</button>
            </div>
        </div>
        <div class="config-panel" id="nilex-config">
            <div class="config-row">
                <label>Main Title:</label>
                <input type="text" id="nx-title" value="Inj. Incretins for CWM - NILEX Landscape" style="width:400px" onchange="Nilex.render()">
            </div>
        </div>
        <div class="canvas-container" id="nilex-canvas-container">
            <canvas id="nilex-canvas"></canvas>
        </div>
        <div class="edit-panel" id="nilex-edit-panel"></div>
    </section>

    <!-- Shared modal for editing items -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">Edit</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" id="modal-delete-btn" onclick="modalDelete()" style="display:none;">Delete</button>
                <button class="btn btn-primary" onclick="modalSave()">Save</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/interact.js"></script>
    <script src="js/portfolio.js"></script>
    <script src="js/competitor.js"></script>
    <script src="js/indication.js"></script>
    <script src="js/regional.js"></script>
    <script src="js/nilex.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
